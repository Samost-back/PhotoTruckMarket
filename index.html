<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barrel Generator</title>
  <style>
    :root {
      --bg: #0b0d12;
      --bg-2: #11141b;
      --surface: #181c26;
      --surface-2: #1f2430;
      --border: #2a2f3d;
      --text: #eef1f6;
      --muted: #8b93a5;
      --accent: #ffc107;
      --accent-hover: #ffd042;
      --accent-ink: #1a1300;
      --ok: #4ade80;
      --err: #f87171;
      --warn: #fbbf24;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(255,193,7,.08), transparent 60%),
        radial-gradient(900px 500px at 100% 0%, rgba(96,165,250,.06), transparent 60%),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    header { margin-bottom: 32px; }
    h1 {
      margin: 0 0 6px;
      font-size: 30px;
      letter-spacing: -0.02em;
    }
    .sub { margin: 0; color: var(--muted); font-size: 15px; }

    /* ---- Dropzone ---- */
    .dropzone {
      display: block;
      position: relative;
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 56px 24px;
      text-align: center;
      cursor: pointer;
      background: var(--surface);
      transition: border-color .15s, background .15s, transform .15s;
      user-select: none;
    }
    .dropzone:hover {
      border-color: var(--accent);
      background: var(--surface-2);
    }
    .dropzone.drag {
      border-color: var(--accent);
      background: var(--surface-2);
      transform: scale(1.005);
    }
    .dropzone-title {
      display: block;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    .dropzone-title em {
      color: var(--accent);
      font-style: normal;
    }
    .dropzone-hint {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .dropzone input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* ---- Actions ---- */
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 24px 0 16px;
    }
    button {
      font: inherit;
      background: var(--accent);
      color: var(--accent-ink);
      border: 0;
      padding: 11px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .05s;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button.secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.secondary:hover:not(:disabled) { background: #262b38; }

    .stats {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 12px;
      min-height: 20px;
    }

    /* ---- Log ---- */
    .log {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: ui-monospace, 'Cascadia Code', Consolas, Monaco, monospace;
      font-size: 12.5px;
      max-height: 220px;
      overflow-y: auto;
      margin-bottom: 24px;
    }
    .log div { padding: 2px 0; }
    .log .ok   { color: var(--ok); }
    .log .err  { color: var(--err); }
    .log .skip { color: var(--muted); }

    /* ---- Results ---- */
    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .15s, transform .15s;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .card .thumb {
      aspect-ratio: 650 / 400;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .card .meta {
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border);
    }
    .card .name {
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .card a {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background .15s;
    }
    .card a:hover { background: rgba(255,193,7,.12); }

    /* ---- Empty state ---- */
    .empty {
      color: var(--muted);
      text-align: center;
      padding: 40px 20px;
      font-size: 14px;
      border: 1px dashed var(--border);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Barrel Generator</h1>
      <p class="sub">Завантажте PNG-файли бочок — об'єм визначиться за останніми 3 цифрами коду, бочка ляже на відповідний шаблон.</p>
    </header>

    <label class="dropzone" id="drop">
      <span class="dropzone-title">Перетягніть PNG сюди або <em>натисніть для вибору</em></span>
      <span class="dropzone-hint">Назва файлу = код (напр. <code>270060.png</code>). Останні 3 цифри визначають об'єм.</span>
      <input type="file" id="fileInput" accept="image/*" multiple />
    </label>

    <div class="actions">
      <button id="generate" disabled>Згенерувати</button>
      <button id="downloadZip" class="secondary" disabled>Завантажити ZIP</button>
      <button id="clear" class="secondary">Очистити</button>
      <button id="toggleTuner" class="secondary">🎯 Налаштувати позиції</button>
    </div>

    <div id="tuner" style="display:none; margin: 20px 0; padding: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px;">
      <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px;">
        <label>Шаблон:
          <select id="tunerTpl" style="padding: 8px; background: var(--bg-2); color: var(--text); border: 1px solid var(--border); border-radius: 6px;"></select>
        </label>
        <label>Тестова бочка:
          <select id="tunerBarrel" style="padding: 8px; background: var(--bg-2); color: var(--text); border: 1px solid var(--border); border-radius: 6px;"></select>
        </label>
        <button id="tunerExport" class="secondary">📋 Скопіювати конфіг</button>
        <button id="tunerReset" class="secondary">Скинути</button>
      </div>
      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
        <div style="background:#fff; border-radius: 8px; overflow: hidden;">
          <canvas id="tunerCanvas" style="width: 100%; display: block;"></canvas>
        </div>
        <div id="tunerControls" style="display: flex; flex-direction: column; gap: 12px;"></div>
      </div>
      <small style="color: var(--muted); display:block; margin-top:12px;">Значення зберігаються в браузері (localStorage). Щоб поділитися — натисніть «Скопіювати конфіг» і замініть у config.js.</small>
    </div>

    <div class="stats" id="stats"></div>
    <div class="log" id="log" style="display:none;"></div>
    <div class="results" id="results">
      <div class="empty" id="empty">Ще нічого не згенеровано</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
