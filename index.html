<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoTruckMarket</title>

  <style>
    :root {
      --bg: #0a0c10;
      --bg-2: #0f131a;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-2: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.10);

      --text: #e9eef7;
      --muted: #9aa3b2;

      --accent: #ffc107;
      --accent-hover: #ffd24d;
      --accent-ink: #1a1300;

      --ok: #4ade80;
      --err: #f87171;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: var(--text);
      line-height: 1.5;
      background:
        radial-gradient(1000px 600px at 10% -10%, rgba(255, 193, 7, 0.10), transparent 60%),
        radial-gradient(900px 500px at 100% 0%, rgba(59, 130, 246, 0.08), transparent 60%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 42px 22px 90px;
    }

    header {
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 34px;
      letter-spacing: -0.03em;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    /* DROPZONE */
    .dropzone {
      display: block;
      position: relative;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 54px 22px;
      text-align: center;
      cursor: pointer;

      background: var(--surface);
      backdrop-filter: blur(10px);

      transition: 0.2s ease;
      user-select: none;
    }

    .dropzone:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 193, 7, 0.5);
      background: var(--surface-2);
    }

    .dropzone.drag {
      border-color: var(--accent);
      background: var(--surface-2);
      transform: scale(1.01);
    }

    .dropzone-title {
      display: block;
      font-size: 16px;
      font-weight: 600;
    }

    .dropzone-title em {
      color: var(--accent);
      font-style: normal;
    }

    .dropzone-hint {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .dropzone input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* ACTIONS */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0 14px;
    }

    button {
      font: inherit;
      border: 1px solid transparent;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;

      transition: 0.15s ease;
    }

    button:not(.secondary) {
      background: var(--accent);
      color: var(--accent-ink);
    }

    button:not(.secondary):hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    button.secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      backdrop-filter: blur(8px);
    }

    button.secondary:hover:not(:disabled) {
      background: var(--surface-2);
      border-color: rgba(255, 255, 255, 0.18);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* STATS */
    .stats {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
      min-height: 18px;
    }

    /* LOG */
    .log-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
    }

    .log-overlay.open {
      display: flex;
    }

    .log-panel {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 90%;
      max-width: 700px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
    }

    .log {
      padding: 12px 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas;
      font-size: 12px;
      overflow-y: auto;
      flex: 1;
    }

    .log div {
      padding: 2px 0;
    }

    .log .ok {
      color: var(--ok);
    }

    .log .err {
      color: var(--err);
    }

    .log .skip {
      color: var(--muted);
    }

    /* RESULTS */
    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
      max-height: 520px;
      overflow-y: auto;
      padding-right: 6px;
      border-radius: 14px;
    }

    .results::-webkit-scrollbar {
      width: 6px;
    }

    .results::-webkit-scrollbar-track {
      background: var(--surface);
      border-radius: 6px;
    }

    .results::-webkit-scrollbar-thumb {
      background: rgba(255, 193, 7, 0.35);
      border-radius: 6px;
    }

    .results::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 193, 7, 0.6);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;

      transition: 0.2s ease;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 193, 7, 0.5);
    }

    .card .thumb {
      aspect-ratio: 650 / 400;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .card .meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
    }

    .card .name {
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card a {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 6px;
      transition: 0.15s ease;
    }

    .card a:hover {
      background: rgba(255, 193, 7, 0.12);
    }

    /* EMPTY */
    .empty {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 36px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

  </style>
</head>

<body>
  <div class="container">

    <header>
      <h1>PhotoTruckMarket</h1>
      <p class="sub">Завантаження PNG → автоматичне визначення конфігурації по коду файлу.</p>
    </header>

    <label class="dropzone" id="drop">
      <span class="dropzone-title">Перетягніть папку сюди або <em>оберіть папку</em></span>
      <span class="dropzone-hint">Папка з PNG файлами — структура збережеться</span>
      <input type="file" id="fileInput" webkitdirectory directory />
    </label>

    <div class="actions">
      <button id="generate" disabled>Згенерувати</button>
      <button id="downloadAll" class="secondary" disabled>Скачати все</button>
      <button id="clear" class="secondary">Очистити</button>
      <button id="toggleLog" class="secondary" disabled>Лог</button>
    </div>

    <!-- DEV ONLY: tuner UI (uncomment button above to enable)
    <div id="tuner" style="display:none;">
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px;">
        <select id="tunerTpl"></select>
        <select id="tunerBarrel"></select>
        <button id="tunerExport" class="secondary">Копіювати</button>
        <button id="tunerReset" class="secondary">Reset</button>
      </div>
      <div style="display:grid; grid-template-columns: 2fr 1fr; gap:16px;">
        <div style="background:#fff; border-radius:10px; overflow:hidden;">
          <canvas id="tunerCanvas"></canvas>
        </div>
        <div id="tunerControls"></div>
      </div>
    </div>
    -->

    <div class="stats" id="stats"></div>

    <div class="log-overlay" id="logOverlay">
      <div class="log-panel">
        <div class="log-header">
          <span>Лог обробки</span>
          <button id="closeLog" class="secondary" style="padding:6px 12px;">Закрити</button>
        </div>
        <div class="log" id="log"></div>
      </div>
    </div>

    <div class="results" id="results">
      <div class="empty" id="empty">Немає згенерованих елементів</div>
    </div>

  </div>

  <!-- JSZip removed: folder download via individual files -->
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>

</html>
